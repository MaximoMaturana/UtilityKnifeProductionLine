services:
  influxdb:
    image: influxdb:2.7
    container_name: utility_knife_influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: srh
      DOCKER_INFLUXDB_INIT_BUCKET: production
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: srh-utility-knife-token

  grafana:
    image: grafana/grafana:latest
    container_name: utility_knife_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data: